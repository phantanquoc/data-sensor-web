services:
  mongo:
    image: mongo:7
    container_name: iot_mongo
    ports:
      # Host 27017 đang bị container khác chiếm -> map ra 27018
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  iot-gateway:
    build: .
    container_name: iot_gateway
    ports:
      # Host 3000 đang bị container khác chiếm -> map ra 3001
      - "3001:3000"
    env_file:
      - .env
    environment:
      # Trong mạng Docker gọi MongoDB qua tên service "mongo", không dùng localhost
      - MONGO_URI=mongodb://mongo:27017/mydb
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
